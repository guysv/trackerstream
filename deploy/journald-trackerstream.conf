# trackerstream journald retention drop-in.
#
# Install to:  /etc/systemd/journald.conf.d/trackerstream.conf
#   install -m644 deploy/journald-trackerstream.conf \
#     /etc/systemd/journald.conf.d/trackerstream.conf
#   systemctl restart systemd-journald
#
# All trackerstream services (Caddy, the API, kubo, coturn) log to journald.
# Debian's default is persistent journald with size-based auto-rotation
# (~10% of /var, capped 4 GB). On this single droplet we set explicit, modest
# bounds so logs can't fill the disk and we keep a predictable retention window.
#
# This is a drop-in: only the keys below override the shipped journald.conf;
# everything else keeps its default.

[Journal]
# Persist logs across reboots (matters for post-mortem after a crash/restart).
Storage=persistent

# Hard cap on total on-disk journal size. Oldest entries are dropped first.
SystemMaxUse=1G
# Keep individual rotated files small so pruning is granular.
SystemMaxFileSize=128M

# Time-based retention: drop entries older than this even if under the size cap.
# 30 days is plenty for ops triage on a single node; raise if you need longer.
MaxRetentionSec=30day

# Rotate at least daily so a quiet period doesn't keep one huge active file.
MaxFileSec=1day
