# trackerstream STUN/TURN (coturn) — NAT traversal for the data plane.
#
# STUN (binding discovery) works out of the box; TURN provides the relay
# fallback for symmetric NATs. This is the classic-NAT path; libp2p peers also
# get a libp2p-native path via the master kubo node's Circuit Relay v2 + AutoNAT
# and client-side DCUtR hole punching. install.sh fills __TURN_SECRET__ and
# __PUBLIC_IP__.
listening-port=3478
tls-listening-port=5349
fingerprint
realm=trackerstream

# Public address of the droplet (DigitalOcean: public IP is directly assigned).
external-ip=__PUBLIC_IP__

# TURN long-term credential (relay fallback). Secret injected at install time.
lt-cred-mech
user=trackerstream:__TURN_SECRET__

# Hardening.
no-cli
no-multicast-peers
syslog
